<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Service Client - Cafe Orders</title>
  <link rel="stylesheet" href="/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div id="login-panel">
    <h1>Service Login</h1>
    <form id="login-form">
      <label>Your name: <input type="text" id="login-name" required></label><br>
      <button type="submit">Login</button>
    </form>
  </div>

  <div id="app-panel" style="display:none;">
    <h1>Service Interface</h1>
    <div style="text-align:right; margin-bottom:10px;">
      <span id="user-display"></span>
      <button id="logout-btn">Logout</button>
    </div>
    <form id="new-order-form">
      <label>Items (comma separated):<br>
        <textarea id="items" rows="3" cols="30" required></textarea>
      </label><br>
      <button type="submit">Create Order</button>
    </form>
    <h2>Current Orders</h2>
    <ul id="orders-list"></ul>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/service.js"></script>
</body>
</html>
